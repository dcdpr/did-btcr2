name: github pages

permissions:
  contents: write
  pages: write

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v2

      - name: Install mdbook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.5.2'

      - name: Install mdbook-bib
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-bib
          version: '=0.5.2'
          locked: true

      - name: Install mdbook-mermaid
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-mermaid
          git: 'https://github.com/badboy/mdbook-mermaid'
          rev: '25c2b56daed067db36fc224e1d93054c5ca6531c'
          locked: true

      - name: Install mdbook-tera
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-tera
          git: 'https://github.com/stevecheckoway/mdbook-tera'
          rev: 'cdb9d902b714a5efa5a025a7d263e0924eb4d4d4'
          locked: true

      - name: Build
        run: mdbook build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
